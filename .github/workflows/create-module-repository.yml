name: Create Module Repository

on:
  workflow_dispatch:
    inputs:
      moduleName:
        description: 'PascalCase module name (e.g. News). Repository will be named vc-module-{kebab}'
        required: true
        type: string
      companyName:
        description: 'Company namespace prefix'
        required: false
        type: string
        default: 'AndrewEhlo-org'
      author:
        description: 'Module author name'
        required: false
        type: string
        default: 'AndrewEhlo-org'
      moduleVersion:
        description: 'Initial module version'
        required: false
        type: string
        default: '3.1000.0'
      platformVersion:
        description: 'Required platform version'
        required: false
        type: string
        default: '3.1000.0'
      coreVersion:
        description: 'Required core module version'
        required: false
        type: string
        default: '3.1000.0'
      template:
        description: 'Module code template'
        required: false
        type: choice
        options:
          - vc-module-dba
          - vc-module-dba-xapi
          - vc-module-xapi
          - vc-crud
        default: 'vc-module-dba'
      visibility:
        description: 'Repository visibility'
        required: false
        type: choice
        options:
          - public
          - private
        default: 'public'

# Prevent concurrent runs for the same module name to avoid race conditions
# on existence checks and resource creation.
concurrency:
  group: module-repository-${{ inputs.moduleName }}-${{ inputs.companyName }}
  cancel-in-progress: false

jobs:

  create-module-repository:
    runs-on: ubuntu-latest
    # Requires manual approval from a designated reviewer before any resources are created.
    # Configure required reviewers at: Settings → Environments → create-org-repo
    environment: create-org-repo
    env:
      GH_TOKEN: ${{ secrets.MODULE_REPO_MGMT_TOKEN }}

    steps:

      - name: Validate inputs
        env:
          MODULE_NAME: ${{ inputs.moduleName }}
        run: |
          # Must start with an uppercase letter and contain only letters and digits
          if ! echo "$MODULE_NAME" | grep -qE '^[A-Z][a-zA-Z0-9]+$'; then
            echo "::error::moduleName '$MODULE_NAME' is invalid. Must start with an uppercase letter and contain only letters and digits (e.g. 'News', 'NewsArticle')."
            exit 1
          fi

      - name: Compute names
        id: names
        env:
          MODULE_NAME: ${{ inputs.moduleName }}
          COMPANY_NAME: ${{ inputs.companyName }}
        run: |
          # Convert PascalCase to kebab-case (e.g. NewsArticle → news-article)
          KEBAB=$(echo "$MODULE_NAME" | sed 's/\([A-Z]\)/-\1/g' | sed 's/^-//' | tr '[:upper:]' '[:lower:]')
          REPO_NAME="vc-module-${KEBAB}"
          MODULE_ID="${COMPANY_NAME}.${MODULE_NAME}"
          SONAR_KEY="${COMPANY_NAME}_${REPO_NAME}"
          echo "repoName=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "moduleId=${MODULE_ID}" >> $GITHUB_OUTPUT
          echo "sonarProjectKey=${SONAR_KEY}" >> $GITHUB_OUTPUT
          # Also export as env vars for subsequent steps
          echo "REPO_NAME=${REPO_NAME}" >> $GITHUB_ENV
          echo "MODULE_ID=${MODULE_ID}" >> $GITHUB_ENV
          echo "SONAR_PROJECT_KEY=${SONAR_KEY}" >> $GITHUB_ENV
          echo "Repository:       ${REPO_NAME}"
          echo "Module ID:        ${MODULE_ID}"
          echo "SonarCloud key:   ${SONAR_KEY}"

      - name: Check repository does not exist
        run: |
          if gh api /repos/${{ inputs.companyName }}/${{ steps.names.outputs.repoName }} --silent 2>/dev/null; then
            echo "::error::Repository ${{ inputs.companyName }}/${{ steps.names.outputs.repoName }} already exists."
            exit 1
          fi

      - name: Check SonarCloud project does not exist
        if: ${{ inputs.visibility == 'public' }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
            "https://sonarcloud.io/api/projects/search?projects=${{ steps.names.outputs.sonarProjectKey }}&organization=${{ secrets.SONAR_ORG_KEY }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::SonarCloud project search failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          TOTAL=$(echo "$BODY" | grep -o '"total":[0-9]*' | cut -d: -f2)
          echo "Projects found: ${TOTAL:-0}"
          if [ "${TOTAL:-0}" -gt "0" ]; then
            echo "::error::SonarCloud project '${{ steps.names.outputs.sonarProjectKey }}' already exists."
            exit 1
          fi

      - name: Create repository
        id: create-repo
        run: |
          gh repo create ${{ inputs.companyName }}/${{ steps.names.outputs.repoName }} \
            --${{ inputs.visibility }} \
            --description "${{ inputs.companyName }} ${{ inputs.moduleName }} module"
          echo "created=true" >> $GITHUB_OUTPUT

      - name: Configure repository settings
        run: |
          gh api \
            --method PATCH \
            /repos/${{ inputs.companyName }}/${{ steps.names.outputs.repoName }} \
            --field allow_merge_commit=false \
            --field allow_squash_merge=true \
            --field squash_merge_commit_title=PR_TITLE \
            --field squash_merge_commit_message=BLANK \
            --field allow_rebase_merge=false \
            --field allow_update_branch=true \
            --field delete_branch_on_merge=true

      - name: Configure teams
        run: |
          declare -A TEAMS=([platform]=push [virto-commerce]=maintain [virto-operations]=admin)
          for TEAM in "${!TEAMS[@]}"; do
            echo "Adding team $TEAM (${TEAMS[$TEAM]})"
            gh api \
              --method PUT \
              /orgs/${{ inputs.companyName }}/teams/$TEAM/repos/${{ inputs.companyName }}/${{ steps.names.outputs.repoName }} \
              --field permission=${TEAMS[$TEAM]}
          done

      - name: Checkout .github (workflow templates)
        uses: actions/checkout@v4
        with:
          path: dotgithub

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install module template
        run: dotnet new install VirtoCommerce.Module.Template

      - name: Generate module code
        run: |
          dotnet new ${{ inputs.template }} \
            --output /tmp/generated \
            --ModuleName "${{ inputs.moduleName }}" \
            --CompanyName "${{ inputs.companyName }}" \
            --Author "${{ inputs.author }}" \
            --ModuleVersion "${{ inputs.moduleVersion }}" \
            --PlatformVersion "${{ inputs.platformVersion }}" \
            --CoreVersion "${{ inputs.coreVersion }}"

      - name: Clone new repository
        run: |
          git clone https://x-access-token:${{ env.GH_TOKEN }}@github.com/${{ inputs.companyName }}/${{ steps.names.outputs.repoName }}.git repo
          # Ensure the default branch is 'main' regardless of org-level settings
          git -C repo symbolic-ref HEAD refs/heads/main

      - name: Copy generated code into repo
        run: |
          # Locate the generated root by its .sln file inside the output directory
          GENERATED_DIR=$(find /tmp/generated -maxdepth 2 -name "*.sln" | head -1 | xargs dirname 2>/dev/null)
          if [ -z "$GENERATED_DIR" ]; then
            echo "::error::dotnet new did not produce expected output — no .sln file found in /tmp/generated."
            exit 1
          fi
          echo "Generated directory: $GENERATED_DIR"
          cp -r "$GENERATED_DIR/." repo/

      - name: Add .deployment folder
        run: |
          mkdir -p repo/.deployment/module
          cat > repo/.deployment/module/cloudDeploy.json << EOF
          {
              "artifactKey": "${{ steps.names.outputs.moduleId }}",
              "deployRepo": "vc-deploy-dev",
              "cmPath": "backend/packages.json",
              "dev": {
                  "deployAppName": "vcptcore-dev",
                  "deployBranch": "vcptcore-dev",
                  "environmentId": "dev",
                  "environmentName": "Development",
                  "environmentType": "staging",
                  "environmentUrl": "https://vcptcore-dev.govirto.com/"
              },
              "qa": {
                  "deployAppName": "vcptcore-qa",
                  "deployBranch": "vcptcore-qa",
                  "environmentId": "qa",
                  "environmentName": "QA",
                  "environmentType": "testing",
                  "environmentUrl": "https://vcptcore-qa.govirto.com/"
              },
              "prod": {
                  "deployAppName": "vcptcore-demo",
                  "deployBranch": "vcptcore-demo",
                  "environmentId": "prod",
                  "environmentName": "Demo",
                  "environmentType": "production",
                  "environmentUrl": "https://vcptcore-demo.govirto.com/"
              }
          }
          EOF

      - name: Add .github workflows
        run: |
          mkdir -p repo/.github/workflows
          cp dotgithub/workflow-templates/module-ci.yml              repo/.github/workflows/
          cp dotgithub/workflow-templates/release.yml                repo/.github/workflows/
          cp dotgithub/workflow-templates/publish-nugets.yml         repo/.github/workflows/
          cp dotgithub/workflow-templates/module-release-hotfix.yml  repo/.github/workflows/

      - name: Add .github community files
        run: |
          cat > repo/.github/CODEOWNERS << 'EOF'
          # Common settings
          .github/ @VirtoCommerce/platform
          .gitignore @VirtoCommerce/platform
          .dockerignore @VirtoCommerce/platform

          # Main Code and Tests
          src/* @VirtoCommerce/platform
          tests/* @VirtoCommerce/platform
          .editorconfig @VirtoCommerce/platform
          EOF

          cat > repo/.github/ISSUE_TEMPLATE.md << 'EOF'
          ---
          name: Bug report or Feature request
          about: Create a report to help us improve
          ---

          ## Current behavior

          ## Expected behavior

          ## Steps to reproduce

          ## Environment
          EOF

          cat > repo/.github/pull_request_template.md << 'EOF'
          ## Description

          ## References
          ### QA-test:
          ### Jira-link:
          ### Artifact URL:
          EOF

      - name: Setup Git credentials
        uses: VirtoCommerce/vc-github-actions/setup-git-credentials-github@master
        with:
          githubToken: ${{ env.GH_TOKEN }}

      - name: Commit and push main
        working-directory: repo
        run: |
          git add .
          git commit -m "ci: Initialize module repository"
          git push -u origin main

      - name: Create and push default dev branch
        working-directory: repo
        run: |
          git checkout -b dev
          git push -u origin dev
          gh repo edit ${{ inputs.companyName }}/${{ steps.names.outputs.repoName }} --default-branch dev

      - name: Protect branches
        run: |
          POLICY=$(cat << 'EOF'
          {
            "required_status_checks": {
              "strict": false,
              "contexts": [
                "license/cla",
                "ci",
                "SonarCloud Code Analysis",
                "module-katalon-tests / e2e-tests"
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": false,
              "require_code_owner_reviews": false,
              "require_last_push_approval": false,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_conversation_resolution": false
          }
          EOF
          )
          for BRANCH in main dev; do
            echo "Protecting branch: $BRANCH"
            echo "$POLICY" | gh api \
              --method PUT \
              /repos/${{ inputs.companyName }}/${{ steps.names.outputs.repoName }}/branches/$BRANCH/protection \
              --input -
          done

      - name: Create SonarCloud project
        id: create-sonarcloud
        if: ${{ inputs.visibility == 'public' }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
            "https://sonarcloud.io/api/projects/create" \
            --data-urlencode "organization=${{ secrets.SONAR_ORG_KEY }}" \
            --data-urlencode "project=$SONAR_PROJECT_KEY" \
            --data-urlencode "name=$REPO_NAME" \
            --data-urlencode "visibility=public")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::SonarCloud project creation failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "created=true" >> $GITHUB_OUTPUT

      - name: Turn off Automatic Analysis
        if: ${{ inputs.visibility == 'public' }}
        # Disables SonarCloud Automatic Analysis so that CI-based analysis
        # (dotnet-sonarscanner in module-ci.yml) is used instead.
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            "https://sonarcloud.io/api/autoscan/activation" \
            --data-urlencode "enable=false" \
            --data-urlencode "projectKey=$SONAR_PROJECT_KEY"

      - name: Configure analysis scope
        if: ${{ inputs.visibility == 'public' }}
        run: |
          # set_setting <key> <param> <value[,value,...]>
          # param: "value" for single-value settings, "values" for multi-value settings
          set_setting() {
            local KEY="$1" PARAM="$2" VALUE="$3"
            local EXTRA_ARGS=()
            if [[ "$PARAM" == "values" ]]; then
              IFS=',' read -ra VALS <<< "$VALUE"
              for V in "${VALS[@]}"; do
                EXTRA_ARGS+=(--data-urlencode "values=$V")
              done
            else
              EXTRA_ARGS=(--data-urlencode "value=$VALUE")
            fi
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
              "https://sonarcloud.io/api/settings/set" \
              --data-urlencode "component=$SONAR_PROJECT_KEY" \
              --data-urlencode "key=$KEY" \
              "${EXTRA_ARGS[@]}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "[$KEY] HTTP $HTTP_CODE: $BODY"
            if [ "$HTTP_CODE" -ge 400 ]; then
              echo "::error::Failed to set $KEY (HTTP $HTTP_CODE): $BODY"
              exit 1
            fi
          }
          set_setting "sonar.sources"                   value  "src"
          set_setting "sonar.tests"                     value  "tests"
          set_setting "sonar.exclusions"                values "**/Migrations/**,**/Scripts/**,**/node_modules/**,**/*.Designer.cs"
          set_setting "sonar.coverage.exclusions"       values "**/Migrations/**,**/Tests/**,**/*.Designer.cs"
          set_setting "sonar.cs.opencover.reportsPaths" values "artifacts/tests/**/*.xml"

      # ── Notify ───────────────────────────────────────────────────────────────

      - name: Create tracking issue
        # Issue creation failure does not fail the workflow — repo setup is already complete.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPO_URL="https://github.com/${{ inputs.companyName }}/${{ steps.names.outputs.repoName }}"

          cat > /tmp/issue-body.md << EOF
          ## Module Repository Created

          | Field | Value |
          |-------|-------|
          | **Repository** | [${{ inputs.companyName }}/${{ steps.names.outputs.repoName }}]($REPO_URL) |
          | **Module ID** | ${{ steps.names.outputs.moduleId }} |
          | **Template** | ${{ inputs.template }} |
          | **Visibility** | ${{ inputs.visibility }} |
          | **Module version** | ${{ inputs.moduleVersion }} |
          | **Platform version** | ${{ inputs.platformVersion }} |
          | **Core version** | ${{ inputs.coreVersion }} |
          | **Author** | ${{ inputs.author }} |
          | **Triggered by** | @${{ github.actor }} |
          | **Workflow run** | [Run #${{ github.run_number }}]($RUN_URL) |
          EOF

          if [ "${{ inputs.visibility }}" = "public" ]; then
            SONAR_URL="https://sonarcloud.io/project/overview?id=${{ steps.names.outputs.sonarProjectKey }}"
            echo "| **SonarCloud** | [${{ steps.names.outputs.sonarProjectKey }}]($SONAR_URL) |" >> /tmp/issue-body.md
          fi

          cat >> /tmp/issue-body.md << 'EOF'

          ## Next steps
          - [ ] Verify team access: `platform` (write), `virto-commerce` (maintain), `virto-operations` (admin)
          - [ ] Push to `dev` to trigger the first CI run — registers required status check names for branch protection
          - [ ] Update `README.md` with module description
          - [ ] Configure SonarCloud project (if visibility is public and not done automatically)
          EOF

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "New module: ${{ inputs.companyName }}/${{ steps.names.outputs.repoName }}" \
            --body-file /tmp/issue-body.md

      - name: Delete GitHub repository (rollback)
        if: failure() && steps.create-repo.outputs.created == 'true'
        run: |
          if DELETE_OUTPUT=$(gh api --method DELETE /repos/${{ inputs.companyName }}/${{ steps.names.outputs.repoName }} 2>&1); then
            echo "Repository ${{ inputs.companyName }}/${{ steps.names.outputs.repoName }} deleted."
          elif echo "$DELETE_OUTPUT" | grep -qi "not found\|404"; then
            echo "Repository does not exist — nothing to clean up."
          else
            echo "::warning::Delete attempt failed: $DELETE_OUTPUT"
          fi

      - name: Delete SonarCloud project (rollback)
        if: failure() && steps.create-sonarcloud.outputs.created == 'true'
        run: |
          if [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "SonarCloud project key not available (failed before computing names) — nothing to clean up."
            exit 0
          fi
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
            "https://sonarcloud.io/api/projects/search?projects=$SONAR_PROJECT_KEY&organization=${{ secrets.SONAR_ORG_KEY }}" \
            2>/dev/null || echo '{}')
          TOTAL=$(echo "$RESPONSE" | grep -o '"total":[0-9]*' | cut -d: -f2)
          if [ "${TOTAL:-0}" -gt "0" ]; then
            echo "Deleting SonarCloud project $SONAR_PROJECT_KEY..."
            curl -sf -X POST \
              -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
              "https://sonarcloud.io/api/projects/delete" \
              --data-urlencode "project=$SONAR_PROJECT_KEY"
            echo "SonarCloud project deleted."
          else
            echo "SonarCloud project does not exist — nothing to clean up."
          fi
